name: Deploy preview to GitHub Pages

# Publishes the static preview in /preview to GitHub Pages so the site can be
# viewed at a public URL without running a server. Rebuilds on every push to
# main. This is a PREVIEW only — the live app (quiz submit, emails, admin)
# requires running `node server.js`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build static preview
        run: node scripts/build-preview.mjs

      - name: Setup Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload preview artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
